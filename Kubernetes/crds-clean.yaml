---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  group: monitoring.coreos.com
  names:
    categories:
      - prometheus-operator
    kind: ServiceMonitor
    listKind: ServiceMonitorList
    plural: servicemonitors
    shortNames:
      - smon
    singular: servicemonitor
  scope: Namespaced
  versions:
    - name: v1
      schema:
        openAPIV3Schema:
          description: |-
            The `ServiceMonitor` custom resource definition (CRD) defines how `Prometheus` and `PrometheusAgent` can scrape metrics from a group of services.
            Among other things, it allows to specify:
            * The services to scrape via label selectors.
            * The container ports to scrape.
            * Authentication credentials to use.
            * Target and metric relabeling.

            `Prometheus` and `PrometheusAgent` objects select `ServiceMonitor` objects using label and namespace selectors.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: |-
                spec defines the specification of desired Service selection for target discovery by
                Prometheus.
              properties:
                attachMetadata:
                  description: |-
                    attachMetadata defines additional metadata which is added to the
                    discovered targets.

                    It requires Prometheus >= v2.37.0.
                  properties:
                    node:
                      description: |-
                        node when set to true, Prometheus attaches node metadata to the discovered
                        targets.

                        The Prometheus service account must have the `list` and `watch`
                        permissions on the `Nodes` objects.
                      type: boolean
                  type: object
                bodySizeLimit:
                  description: |-
                    bodySizeLimit when defined, bodySizeLimit specifies a job level limit on the size
                    of uncompressed response body that will be accepted by Prometheus.

                    It requires Prometheus >= v2.28.0.
                  pattern: (^0|([0-9]*[.])?[0-9]+((K|M|G|T|E|P)i?)?B)$
                  type: string
                convertClassicHistogramsToNHCB:
                  description: |-
                    convertClassicHistogramsToNHCB defines whether to convert all scraped classic histograms into a native histogram with custom buckets.
                    It requires Prometheus >= v3.0.0.
                  type: boolean
                endpoints:
                  description: |-
                    endpoints defines the list of endpoints part of this ServiceMonitor.
                    Defines how to scrape metrics from Kubernetes [Endpoints](https://kubernetes.io/docs/concepts/services-networking/service/#endpoints) objects.
                    In most cases, an Endpoints object is backed by a Kubernetes [Service](https://kubernetes.io/docs/concepts/services-networking/service/) object with the same name and labels.
                  items:
                    description: |-
                      Endpoint defines an endpoint serving Prometheus metrics to be scraped by
                      Prometheus.
                    properties:
                      authorization:
                        description: |-
                          authorization configures the Authorization header credentials used by
                          the client.

                          Cannot be set at the same time as `basicAuth`, `bearerTokenSecret` or `oauth2`.
                        properties:
                          credentials:
                            description: credentials defines a key of a Secret in the namespace that contains the credentials for authentication.
                            properties:
                              key:
                                description: The key of the secret to select from.  Must be a valid secret key.
                                type: string
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                              optional:
                                description: Specify whether the Secret or its key must be defined
                                type: boolean
                            required:
                              - key
                            type: object
                            x-kubernetes-map-type: atomic
                          type:
                            description: |-
                              type defines the authentication type. The value is case-insensitive.

                              "Basic" is not a supported value.

                              Default: "Bearer"
                            type: string
                        type: object
                      basicAuth:
                        description: |-
                          basicAuth defines the Basic Authentication credentials used by the
                          client.

                          Cannot be set at the same time as `authorization`, `bearerTokenSecret` or `oauth2`.
                        properties:
                          password:
                            description: |-
                              password defines a key of a Secret containing the password for
                              authentication.
                            properties:
                              key:
                                description: The key of the secret to select from.  Must be a valid secret key.
                                type: string
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                              optional:
                                description: Specify whether the Secret or its key must be defined
                                type: boolean
                            required:
                              - key
                            type: object
                            x-kubernetes-map-type: atomic
                          username:
                            description: |-
                              username defines a key of a Secret containing the username for
                              authentication.
                            properties:
                              key:
                                description: The key of the secret to select from.  Must be a valid secret key.
                                type: string
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                              optional:
                                description: Specify whether the Secret or its key must be defined
                                type: boolean
                            required:
                              - key
                            type: object
                            x-kubernetes-map-type: atomic
                        type: object
                      bearerTokenFile:
                        description: |-
                          bearerTokenFile defines the file to read bearer token for scraping the target.

                          Deprecated: use `authorization` instead.
                        type: string
                      bearerTokenSecret:
                        description: |-
                          bearerTokenSecret defines a key of a Secret containing the bearer token
                          used by the client for authentication. The secret needs to be in the
                          same namespace as the custom resource and readable by the Prometheus
                          Operator.

                          Cannot be set at the same time as `authorization`, `basicAuth` or `oauth2`.

                          Deprecated: use `authorization` instead.
                        properties:
                          key:
                            description: The key of the secret to select from.  Must be a valid secret key.
                            type: string
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                          optional:
                            description: Specify whether the Secret or its key must be defined
                            type: boolean
                        required:
                          - key
                        type: object
                        x-kubernetes-map-type: atomic
                      enableHttp2:
                        description: enableHttp2 can be used to disable HTTP2.
                        type: boolean
                      filterRunning:
                        description: |-
                          filterRunning when true, the pods which are not running (e.g. either in Failed or
                          Succeeded state) are dropped during the target discovery.

                          If unset, the filtering is enabled.

                          More info: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#pod-phase
                        type: boolean
                      followRedirects:
                        description: |-
                          followRedirects defines whether the client should follow HTTP 3xx
                          redirects.
                        type: boolean
                      honorLabels:
                        description: |-
                          honorLabels defines when true the metric's labels when they collide
                          with the target's labels.
                        type: boolean
                      honorTimestamps:
                        description: |-
                          honorTimestamps defines whether Prometheus preserves the timestamps
                          when exposed by the target.
                        type: boolean
                      interval:
                        description: |-
                          interval at which Prometheus scrapes the metrics from the target.

                          If empty, Prometheus uses the global scrape interval.
                        pattern: ^(0|(([0-9]+)y)?(([0-9]+)w)?(([0-9]+)d)?(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?(([0-9]+)ms)?)$
                        type: string
                      metricRelabelings:
                        description: |-
                          metricRelabelings defines the relabeling rules to apply to the
                          samples before ingestion.
                        items:
                          description: |-
                            RelabelConfig allows dynamic rewriting of the label set for targets, alerts,
                            scraped samples and remote write samples.

                            More info: https://prometheus.io/docs/prometheus/latest/configuration/configuration/#relabel_config
                          properties:
                            action:
                              default: replace
                              description: |-
                                action to perform based on the regex matching.

                                `Uppercase` and `Lowercase` actions require Prometheus >= v2.36.0.
                                `DropEqual` and `KeepEqual` actions require Prometheus >= v2.41.0.

                                Default: "Replace"
                              enum:
                                - replace
                                - Replace
                                - keep
                                - Keep
                                - drop
                                - Drop
                                - hashmod
                                - HashMod
                                - labelmap
                                - LabelMap
                                - labeldrop
                                - LabelDrop
                                - labelkeep
                                - LabelKeep
                                - lowercase
                                - Lowercase
                                - uppercase
                                - Uppercase
                                - keepequal
                                - KeepEqual
                                - dropequal
                                - DropEqual
                              type: string
                            modulus:
                              description: |-
                                modulus to take of the hash of the source label values.

                                Only applicable when the action is `HashMod`.
                              format: int64
                              type: integer
                            regex:
                              description: regex defines the regular expression against which the extracted value is matched.
                              type: string
                            replacement:
                              description: |-
                                replacement value against which a Replace action is performed if the
                                regular expression matches.

                                Regex capture groups are available.
                              type: string
                            separator:
                              description: separator defines the string between concatenated SourceLabels.
                              type: string
                            sourceLabels:
                              description: |-
                                sourceLabels defines the source labels select values from existing labels. Their content is
                                concatenated using the configured Separator and matched against the
                                configured regular expression.
                              items:
                                description: |-
                                  LabelName is a valid Prometheus label name.
                                  For Prometheus 3.x, a label name is valid if it contains UTF-8 characters.
                                  For Prometheus 2.x, a label name is only valid if it contains ASCII characters, letters, numbers, as well as underscores.
                                type: string
                              type: array
                            targetLabel:
                              description: |-
                                targetLabel defines the label to which the resulting string is written in a replacement.

                                It is mandatory for `Replace`, `HashMod`, `Lowercase`, `Uppercase`,
                                `KeepEqual` and `DropEqual` actions.

                                Regex capture groups are available.
                              type: string
                          type: object
                        type: array
                      noProxy:
                        description: |-
                          noProxy defines a comma-separated string that can contain IPs, CIDR notation, domain names
                          that should be excluded from proxying. IP and domain names can
                          contain port numbers.

                          It requires Prometheus >= v2.43.0, Alertmanager >= v0.25.0 or Thanos >= v0.32.0.
                        type: string
                      oauth2:
                        description: |-
